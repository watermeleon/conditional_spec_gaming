# Model arguments
model_name_or_path: google/gemma-2-2b-it
environment_type: action_advice
use_local_judge: false
exp_name: llm_agent_grpo

# PEFT/LoRA config
use_peft: true
lora_r: 8
lora_alpha: 32
lora_dropout: 0.1
lora_task_type: CAUSAL_LM
lora_target_modules: ["q_proj", "o_proj", "k_proj", "v_proj", "gate_proj", "up_proj", "down_proj"]
use_rslora: true

# Environment settings
vuln_frac: 0.5
judge_model_name: google/gemma-2-2b-it
n_samples: 1000
eval_split_size: 20
reward_verbose: false

# vLLM
use_vllm: true
vllm_gpu_memory_utilization: 0.4
vllm_mode: colocate
vllm_tensor_parallel_size: 1

# GRPO trainer config
learning_rate: 1.0e-05
lr_scheduler_type: constant_with_warmup
max_prompt_length: 1024
max_completion_length: 256
max_steps: 300
num_generations: 5
num_train_epochs: 1000
per_device_eval_batch_size: 10
per_device_train_batch_size: 10
report_to:
  - wandb
run_name: llm_agent_grpo
seed: 42
temperature: 1.0
warmup_ratio: 0.1
remove_unused_columns: false
max_grad_norm: 1.0

# Save and Logging settings
output_dir: data/grpo_output
save_strategy: "no"
save_steps: 300
log_level: info
logging_first_step: true
logging_steps: 25
logging_strategy: steps
log_completions: true

# Eval Settings
eval_strategy: "no"
eval_steps: 25
do_eval: false

# Optional: Push to hub
push_to_hub: false
